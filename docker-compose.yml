services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: short_url_0
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - ./deploy/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
